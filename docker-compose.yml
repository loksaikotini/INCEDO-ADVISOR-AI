# FILE: docker-compose.yml
# Advisor AI — Infrastructure Stack
# Run: docker-compose up -d
# This starts: OpenSearch (2.x), OpenSearch Dashboards, Redis, PostgreSQL
#
# OpenSearch is fully open-source (Apache 2.0) — https://opensearch.org/

version: '3.8'

services:
  # ─── Qdrant (Vector Database) ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: advisor-ai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - advisor-ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Neo4j (Graph Database) ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: advisor-ai-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
    networks:
      - advisor-ai-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Redis (Session Context + Pub/Sub Streaming) ────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: advisor-ai-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - advisor-ai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── OpenSearch (Full-Text Search & Analytics) ──────────────────────────────
  opensearch-node1:
    image: opensearchproject/opensearch:2.11.0
    container_name: opensearch-node1
    environment:
      - cluster.name=advisor-ai-cluster
      - node.name=opensearch-node1
      - discovery.seed_hosts=opensearch-node1
      - cluster.initial_master_nodes=opensearch-node1
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - advisor-ai-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch-node1:9200"]'
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=true"
    networks:
      - advisor-ai-net
    depends_on:
      - opensearch-node1

  # ─── PostgreSQL (Primary Database) ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: advisor-ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: advisor_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - advisor-ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  opensearch_data:
    driver: local

networks:
  advisor-ai-net:
    driver: bridge
